name: Build and Push Docker Images

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build frontend (test only)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: hzkxh7gn0m/photographer-web:0.1.0

  push-frontend:
    runs-on: ubuntu-latest
    needs: build-frontend
    if: github.ref == 'refs/heads/master'
    environment: Production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: hzkxh7gn0m/photographer-web:0.1.0

  deploy:
    runs-on: ubuntu-latest
    needs: push-frontend
    if: github.ref == 'refs/heads/master'
    environment: Production
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          passphrase: ${{ secrets.EC2_SSH_PASSPHRASE }}
          script: |
            docker stop photographer-web || true
            docker rm photographer-web || true
            docker pull hzkxh7gn0m/photographer-web:0.1.0
            docker run -d \
              --name photographer-web \
              --restart always \
              -p 3000:3000 \
              hzkxh7gn0m/photographer-web:0.1.0
