name: Build and Push Docker Images

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build frontend (test only)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false # ← only build, don't push on PR
          tags: hzkxh7gn0m/photographer-web:0.1.0

  push-frontend:
    runs-on: ubuntu-latest
    needs: build-frontend # ← only runs after build passes
    if: github.ref == 'refs/heads/master' # ← only runs on master
    environment: Docker
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true # ← only pushes on master
          tags: hzkxh7gn0m/photographer-web:0.1.0
